services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: approvals
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d approvals"]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/approvals
      KIMI_API_KEY: ${KIMI_API_KEY}
      KIMI_BASE_URL: ${KIMI_BASE_URL:-https://api.moonshot.ai/v1}
      KIMI_MODEL: ${KIMI_MODEL:-kimi-k2.6}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      SEED_ON_STARTUP: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
